services:
  postgresql:
    image: postgres:16
    restart: always
    networks:
      - openproxy-net
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openproxy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - openproxy-net
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  server:
    image: ghcr.io/xuerzong/openproxy-server:latest
    ports:
      - "3888:3888"
    env_file:
      - .env
    depends_on:
      - postgresql
      - redis
    restart: always
    networks:
      - openproxy-net

  api:
    image: ghcr.io/xuerzong/openproxy-api:latest
    ports:
      - "5060:5060"
    env_file:
      - .env
    depends_on:
      - postgresql
    restart: always
    networks:
      - openproxy-net

  web-tenant:
    image: ghcr.io/xuerzong/openproxy-web:latest
    ports:
      - "5090:80"
    environment:
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID:-}
    depends_on:
      - server
    restart: always
    networks:
      - openproxy-net

  web-admin:
    image: ghcr.io/xuerzong/openproxy-web:latest
    ports:
      - "5091:80"
    environment:
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID:-}
    depends_on:
      - server
    restart: always
    networks:
      - openproxy-net

volumes:
  pgdata:
  redisdata:

networks:
  openproxy-net:
    driver: bridge
